; minilog-web-viewer test configuration
[server]
host = 127.0.0.1
udp_port = 5140
workers = 2

[output.main]
text_file  = logs/syslog.log
jsonl_file = logs/syslog.jsonl
max_size   = 100MB
max_files  = 5
facility   = *
include_malformed = true

[output.auth]
text_file  = logs/auth.log
jsonl_file = logs/auth.jsonl
max_size   = 50MB
max_files  = 5
facility   = auth,authpriv
include_malformed = false
