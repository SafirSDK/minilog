; Configuration for syslog-server.py
; Place this file next to syslog-server.py as "syslog-server.conf"
; If this file is missing there are sane defaults being used.

[server]
; Host/IP to bind (default is 0.0.0.0 to listen on all IPv4 interfaces)
; host = 127.0.0.1

; UDP port to bind (default is 514; requires root on some OS:es)
; port = 5514

; Decode incoming bytes with this encoding (default is utf-8)
; encoding = latin-1

; Write output to this file.
; output = C:\temp\syslog.log

; When true, do not write to stdout
; no_stdout = true

; Enable case-sensitive matching for exclude patterns
; case_sensitive = true

; Include original timestamp field (ts=...) in output
; show_ts = true

; Include source address (src=ip:port) in output
; show_src = true

; Allow multiple processes to bind the same UDP port (SO_REUSEPORT)
; reuse_port = true

; Exclusion patterns (regex). Comma-separated and/or multi-line.
; Patterns here are additive with CLI -e/--exclude.
exclude = nodecom
exclude = logging on
exclude = logging off
; Additional examples:
; exclude = DEBUG
; exclude = ^test-.*$
