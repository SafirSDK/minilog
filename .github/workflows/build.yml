name: Build & Test

on:
  push:
    branches: [ master, 'private/**' ]
  pull_request:
    branches: [ master ]

jobs:
  # ─── Linux (GCC) ────────────────────────────────────────────────────────────
  linux:
    name: Linux (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build libboost-all-dev

      - name: Configure
        run: cmake --preset linux-release

      - name: Build
        run: cmake --build --preset linux-release

      - name: Test
        run: ctest --preset linux-release

  # ─── Linux (Clang, ASan + UBSan) ────────────────────────────────────────────
  linux-sanitizers:
    name: Linux (Clang ASan+UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build clang libboost-all-dev

      - name: Configure
        run: cmake --preset linux-asan

      - name: Build
        run: cmake --build --preset linux-asan

      - name: Test
        run: ctest --preset linux-asan

  # ─── Windows (MSVC) ─────────────────────────────────────────────────────────
  windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        run: pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-windows-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-windows-

      - name: Conan install
        run: |
          conan install . `
            --output-folder=build/windows-release `
            --build=missing `
            --settings=build_type=Release

      - name: Configure
        run: cmake --preset windows-release

      - name: Build
        run: cmake --build --preset windows-release

      - name: Test
        run: ctest --preset windows-release
