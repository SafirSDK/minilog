name: Build & Test

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  # ─── clang-format check ─────────────────────────────────────────────────────
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src tests fuzz -name "*.cpp" -o -name "*.hpp" \
            | xargs clang-format --dry-run --Werror

  # ─── File header check ───────────────────────────────────────────────────────
  check-headers:
    name: File header check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 tests/check_headers.py

  # ─── Linux (GCC) ────────────────────────────────────────────────────────────
  linux:
    name: Linux (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build libboost-all-dev

      - name: Configure
        run: cmake --preset linux-release

      - name: Build
        run: cmake --build --preset linux-release

      - name: Test
        env:
          BOOST_TEST_LOG_LEVEL: test_suite
        run: ctest --preset linux-release

  # ─── Linux (Clang, ASan + UBSan) ────────────────────────────────────────────
  linux-sanitizers:
    name: Linux (Clang ASan+UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build clang libboost-all-dev

      - name: Configure
        run: cmake --preset linux-asan

      - name: Build
        run: cmake --build --preset linux-asan

      - name: Test
        env:
          BOOST_TEST_LOG_LEVEL: test_suite
        run: ctest --preset linux-asan

  # ─── Linux (GCC, coverage) ──────────────────────────────────────────────────
  linux-coverage:
    name: Linux (Coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build libboost-all-dev lcov

      - name: Configure
        run: cmake --preset linux-coverage

      - name: Build
        run: cmake --build --preset linux-coverage

      - name: Test
        env:
          BOOST_TEST_LOG_LEVEL: test_suite
        run: ctest --preset linux-coverage

      - name: Generate coverage report
        run: |
          lcov --capture --directory build/linux-coverage --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── Linux (Clang, TSan) ────────────────────────────────────────────────────
  linux-tsan:
    name: Linux (Clang TSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build clang libboost-all-dev

      - name: Configure
        run: cmake --preset linux-tsan

      - name: Build
        run: cmake --build --preset linux-tsan

      - name: Test
        env:
          BOOST_TEST_LOG_LEVEL: test_suite
        run: ctest --preset linux-tsan

  # ─── Windows (MSVC) ─────────────────────────────────────────────────────────
  windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Conan
        run: pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.conan2/p
            ~/.conan2/cache.sqlite3
          key: conan-windows-relwithdebinfo-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-windows-relwithdebinfo-

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Conan install
        run: |
          conan install . `
            --output-folder=build/windows-release `
            --build=missing `
            --settings=build_type=RelWithDebInfo `
            --settings=compiler.runtime=static `
            -c tools.cmake.cmaketoolchain:generator=Ninja

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset windows-release

      - name: Build
        run: cmake --build --preset windows-release

      - name: Build installer
        run: cmake --build --preset windows-release --target package

      - name: Test
        env:
          BOOST_TEST_LOG_LEVEL: test_suite
        run: ctest --preset windows-release

      - name: Test installer
        shell: pwsh
        run: |
          $exe = Get-Item "build/windows-release/minilog-*-setup.exe" | Select-Object -First 1
          python tests/installer/test_installer.py $exe.FullName

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: minilog-installer
          path: build/windows-release/minilog-*-setup.exe
          if-no-files-found: error

      - name: Publish installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows-release/minilog-*-setup.exe

  # ─── Linux (Clang, libFuzzer) ────────────────────────────────────────────
  linux-fuzz:
    name: Linux (libFuzzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build clang libboost-all-dev

      - name: Configure
        run: cmake --preset linux-fuzz

      - name: Build
        run: cmake --build --preset linux-fuzz --target fuzz_parser

      - name: Fuzz (30 s)
        run: |
          ./build/linux-fuzz/tests/fuzz_parser \
            -max_total_time=30 \
            -jobs=2 \
            tests/fuzz/corpus/

  # ─── Docker ──────────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build .
